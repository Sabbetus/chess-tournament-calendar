name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Scrape tournaments"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/deploy-pages has no built-in retry, and GitHub's Pages backend
      # occasionally rejects a deployment (fails in ~10-20s) if a prior
      # deployment on their end hasn't fully settled yet, or (rarely) stalls
      # and hits the action's own 10-minute timeout. Both are transient and
      # clear on their own, so we retry up to 3 times with backoff before
      # letting the job actually fail.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Resolve deployment result
        id: deployment
        run: |
          if [ "${{ steps.deploy1.outcome }}" == "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" == "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "page_url=${{ steps.deploy3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          fi

      # Checkout (with the prior commit) so the next step can diff the data and
      # find which tournaments are new this run. fetch-depth: 2 gives us HEAD~1.
      - name: Checkout for change detection
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 2

      # Notify IndexNow (Bing, Yandex, Seznam, Naver — not Google) of changed
      # URLs. Runs AFTER deploy so the pages are already live. We submit the
      # homepages and country/continent pages (their contents shift on every
      # scrape as tournaments come and go, not just when a slug first appears)
      # plus every newly-added tournament page in all 6 languages — that's
      # IndexNow's intended use. URLs per run stay well under the
      # 10k-per-request limit, and we make one request per deploy, so rate
      # limits aren't a concern. The HTTP status is printed so each deploy
      # self-verifies (200/202 = accepted). The key is public by design
      # (served at the keyLocation below).
      - name: Notify IndexNow
        # Best-effort only: the deploy has already succeeded by this point, so a
        # failed/slow IndexNow ping must never mark the run as failed.
        continue-on-error: true
        run: |
          BASE="https://chesstournamentcalendar.com"
          LANGS="es pt de cs fi"

          # Homepages always change on a scrape.
          URLS="$BASE/"
          for l in $LANGS; do URLS="$URLS $BASE/$l/"; done

          # Country/continent pages -- unconditional every deploy, same
          # reasoning as homepages (see comment above).
          LOCATION_URLS=$(python3 -c "
          import sys
          sys.path.insert(0, 'scraper')
          from submit_indexnow import location_urls
          for u in location_urls():
              print(u)
          ")
          URLS="$URLS $LOCATION_URLS"

          # New tournament slugs = present in current data but not the prior commit.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git show HEAD~1:public/data/tournaments.json > /tmp/prev.json 2>/dev/null || echo '[]' > /tmp/prev.json
            NEW=$(jq -r -n \
              --slurpfile cur public/data/tournaments.json \
              --slurpfile prev /tmp/prev.json '
                ($prev[0] // [] | map(.slug)) as $old
                | ($cur[0] // [] | map(.slug))
                | map(select(. as $s | ($old | index($s)) == null))
                | .[]')
            # Trailing slash matches the canonical/sitemap form — submitting the
            # unslashed URL would hand IndexNow a 301 redirect instead.
            for s in $NEW; do
              URLS="$URLS $BASE/tournament/$s/"
              for l in $LANGS; do URLS="$URLS $BASE/$l/tournament/$s/"; done
            done
          fi

          COUNT=$(printf '%s\n' $URLS | grep -c .)
          echo "Submitting $COUNT URLs to IndexNow"
          PAYLOAD=$(printf '%s\n' $URLS | jq -R . | jq -s '{
            host: "chesstournamentcalendar.com",
            key: "d3a6913ec3c84c58bf5edd4a2542ce02",
            keyLocation: "https://chesstournamentcalendar.com/d3a6913ec3c84c58bf5edd4a2542ce02.txt",
            urlList: .
          }')

          # --retry/--max-time ride out transient transport errors; the trailing
          # `|| HTTP=000` keeps a curl failure from tripping `set -e` and failing
          # the step (a large batch once died on a transient connection error).
          HTTP=$(curl -s -o /tmp/indexnow.out -w "%{http_code}" \
            --retry 3 --retry-delay 2 --retry-all-errors --max-time 60 \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD") || HTTP="000"
          echo "IndexNow HTTP $HTTP"
          cat /tmp/indexnow.out 2>/dev/null || true
          case "$HTTP" in
            200|202) echo "✓ IndexNow accepted the submission" ;;
            *) echo "⚠ IndexNow returned $HTTP (expected 200/202) — verify the key file and payload" ;;
          esac
