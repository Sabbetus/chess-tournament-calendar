name: Scrape tournaments

on:
  schedule:
    # Every 12 hours: 70 minutes past midnight and noon UTC (avoids top-of-hour congestion)
    - cron: '10 1,13 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper/scrape_chess_results.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/tournaments.json public/data/meta.json
          if git diff --cached --quiet; then
            echo "No changes to tournament data."
          else
            git commit -m "chore: update tournament data"
            git push
          fi
